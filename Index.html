<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.form-container{
    background:white;
    padding:30px;
    border-radius:8px;
    width:350px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
}

input, textarea{
    width:100%;
    padding:10px;
    margin-top:8px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:10px;
    border:none;
    background:#007BFF;
    color:white;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}
</style>
</head>

<body>

<div class="form-container">
<h2>Contact Us</h2>

<form action="https://formspree.io/f/mojkjdeq" method="POST">

<label>Name</label>
<input type="text" name="name" required>

<label>Firm's Name</label>
<input type="text" name="firm">

<label>Email</label>
<input type="email" name="email" required>

<label>Phone Number</label>
<input type="tel" name="phone">

<label>Message</label>
<textarea name="message" rows="4" required></textarea>

<button type="submit">Send Message</button>

</form>
</div>

</body>
</html>
